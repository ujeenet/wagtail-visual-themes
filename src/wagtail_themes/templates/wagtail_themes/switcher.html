{% load static %}
<div class="wt-switcher" data-wt-switcher role="group" aria-label="Theme">
    <button type="button" data-wt-mode="light" aria-label="Light mode">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round"><circle cx="12" cy="12" r="4"/>
             <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
    </button>
    <button type="button" data-wt-mode="system" aria-label="System mode">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/>
             <path d="M9 20h6M12 18v2"/></svg>
    </button>
    <button type="button" data-wt-mode="dark" aria-label="Dark mode">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>
</div>
<link rel="stylesheet" href="{% static 'wagtail_themes/css/switcher.css' %}">
<script src="{% static 'wagtail_themes/js/switcher.js' %}" defer></script>
