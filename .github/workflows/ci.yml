name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests · py${{ matrix.python-version }} · ${{ matrix.wagtail }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        wagtail: ["wagtail>=6.3,<7.0", "wagtail>=7.0,<8.0"]
        exclude:
          # Wagtail 7 dropped Python 3.10 — keep matrix lean and skip 6.x on 3.13
          - python-version: "3.13"
            wagtail: "wagtail>=6.3,<7.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "${{ matrix.wagtail }}"

      - name: Run tests
        run: PYTHONPATH=src python -m pytest tests/ -v

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install ruff
      - run: ruff check src tests

  build:
    name: build · sdist + wheel
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
